<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kamikaze Football · PL Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080d18; --panel:#101a2c; --panel-2:#16223a; --raised:#1d2c49;
    --line:#283a5c; --line-soft:#1c2a44;
    --ink:#eaf1fb; --muted:#8ea0c0; --faint:#5e7095;
    --go:#19e2a0;        /* alive / win */
    --go-dim:#0e7d5c;
    --warn:#ffc043;      /* low lives */
    --danger:#ff5b7e;    /* loss / out */
    --pitch:#2a3d5e;
    --shadow:0 1px 0 rgba(255,255,255,.03), 0 12px 30px -18px rgba(0,0,0,.8);
    --disp:'Barlow Condensed', system-ui, sans-serif;
    --body:'Barlow', system-ui, -apple-system, sans-serif;
    --num:ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 500px at 50% -200px, rgba(25,226,160,.07), transparent 60%),
      var(--bg);
    color:var(--ink); font-family:var(--body); font-size:15px; line-height:1.45;
    -webkit-font-smoothing:antialiased; padding-bottom:64px;
  }
  .wrap{max-width:1100px; margin:0 auto; padding:0 16px}

  /* ---- Masthead ---- */
  header.top{
    border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg, rgba(16,26,44,.9), rgba(8,13,24,.4));
    position:sticky; top:0; z-index:30; backdrop-filter:blur(8px);
  }
  .mast{display:flex; align-items:center; gap:14px; padding:12px 0}
  .crest{width:38px;height:38px;flex:0 0 auto;filter:drop-shadow(0 0 10px rgba(25,226,160,.3))}
  .title h1{
    font-family:var(--disp); font-weight:700; letter-spacing:.04em;
    margin:0; font-size:23px; line-height:1; text-transform:uppercase;
  }
  .title h1 .k{color:var(--go)}
  .title .sub{font-size:12px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-top:3px}
  .mast .spacer{flex:1}
  .chip{
    font-family:var(--disp); text-transform:uppercase; letter-spacing:.06em;
    font-size:12px; padding:5px 10px; border-radius:999px; border:1px solid var(--line);
    color:var(--muted); display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
  .chip.live .dot{background:var(--go); box-shadow:0 0 8px var(--go)}
  .chip.local .dot{background:var(--warn)}

  /* ---- GW bar ---- */
  .gwbar{display:flex; align-items:center; gap:10px; padding:12px 0 4px}
  .gwbar .lab{font-family:var(--disp);text-transform:uppercase;letter-spacing:.12em;color:var(--faint);font-size:12px}
  .gwstep{
    display:inline-flex;align-items:center;gap:2px;border:1px solid var(--line);
    border-radius:10px;overflow:hidden;background:var(--panel)
  }
  .gwstep button{
    background:none;border:0;color:var(--ink);font-family:var(--num);font-size:15px;
    padding:6px 12px;cursor:pointer
  }
  .gwstep button:hover{background:var(--raised)}
  .gwstep .gwnum{font-family:var(--disp);font-weight:700;font-size:20px;min-width:46px;text-align:center;padding:2px 6px}
  .gwstate{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:var(--disp)}
  .gwstate b{color:var(--go)}

  /* ---- Tabs ---- */
  nav.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line-soft);margin-top:10px;overflow-x:auto}
  nav.tabs button{
    background:none;border:0;color:var(--muted);font-family:var(--disp);
    text-transform:uppercase;letter-spacing:.06em;font-size:15px;font-weight:600;
    padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap
  }
  nav.tabs button:hover{color:var(--ink)}
  nav.tabs button.on{color:var(--ink);border-bottom-color:var(--go)}

  main{padding-top:18px}
  .panel{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;box-shadow:var(--shadow)}
  .panel + .panel{margin-top:16px}
  .phead{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-soft)}
  .phead h2{font-family:var(--disp);text-transform:uppercase;letter-spacing:.05em;font-size:16px;margin:0}
  .phead .hint{font-size:12.5px;color:var(--muted);margin-left:auto}

  /* ---- Standings ---- */
  .board{padding:6px 8px 12px}
  .row{
    display:grid;grid-template-columns:30px 1fr 150px 92px 70px;align-items:center;
    gap:10px;padding:9px 10px;border-radius:10px
  }
  .row.head{color:var(--faint);font-family:var(--disp);text-transform:uppercase;letter-spacing:.08em;font-size:11.5px;padding-bottom:4px}
  .row.mgr:hover{background:var(--panel-2)}
  .row.mgr + .row.mgr{border-top:1px solid var(--line-soft)}
  .rank{font-family:var(--disp);font-weight:700;font-size:18px;color:var(--faint);text-align:center}
  .rank.lead{color:var(--go)}
  .who{display:flex;align-items:center;gap:9px;min-width:0}
  .who .nm{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cards{display:flex;gap:4px}
  .cardpip{
    font-family:var(--disp);font-size:10px;font-weight:700;width:17px;height:17px;border-radius:4px;
    display:grid;place-items:center;cursor:pointer;border:1px solid var(--line);color:var(--faint);user-select:none
  }
  .cardpip.avail{border-color:var(--go-dim);color:var(--go);background:rgba(25,226,160,.08)}
  .cardpip.used{opacity:.45;text-decoration:line-through}
  .cardpip:hover{border-color:var(--ink)}
  .lives{display:flex;align-items:center;gap:8px}
  .pips{display:flex;gap:2px;flex-wrap:nowrap}
  .pip{width:6px;height:16px;border-radius:2px;background:var(--line)}
  .pip.on{background:var(--go)}
  .pip.warn{background:var(--warn)}
  .pip.danger{background:var(--danger)}
  .lifenum{font-family:var(--num);font-size:17px;min-width:26px;text-align:right;font-weight:600}
  .lifenum.warn{color:var(--warn)} .lifenum.danger{color:var(--danger)} .lifenum.go{color:var(--go)}
  .wdl{font-family:var(--num);font-size:13px;color:var(--muted);letter-spacing:.02em;text-align:center}
  .wdl b{color:var(--ink)}
  .bans{font-family:var(--num);font-size:13px;color:var(--faint);text-align:center}
  .row.out{opacity:.5}
  .row.out .nm{text-decoration:line-through}
  .outtag{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--danger);
    border:1px solid var(--danger);border-radius:4px;padding:1px 5px;text-transform:uppercase}
  .sep{display:flex;align-items:center;gap:10px;color:var(--faint);font-family:var(--disp);
    text-transform:uppercase;letter-spacing:.1em;font-size:11px;padding:14px 12px 6px}
  .sep::after{content:"";flex:1;height:1px;background:var(--line-soft)}

  /* ---- generic ---- */
  table.grid{width:100%;border-collapse:collapse}
  table.grid th,table.grid td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line-soft);font-size:14px}
  table.grid th{font-family:var(--disp);text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-size:12px;font-weight:600}
  table.grid td.num,table.grid th.num{text-align:center;font-family:var(--num)}
  select,input[type=text]{
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:7px 9px;font-family:var(--body);font-size:14px;width:100%
  }
  select:focus,input:focus{outline:2px solid var(--go-dim);outline-offset:0}
  select:disabled{opacity:.5}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--panel-2);border:0;color:var(--muted);font-family:var(--disp);font-weight:600;
    font-size:13px;text-transform:uppercase;letter-spacing:.04em;padding:6px 11px;cursor:pointer}
  .seg button + button{border-left:1px solid var(--line)}
  .seg button.on{color:var(--bg)}
  .seg button.on.H{background:var(--go)} .seg button.on.D{background:var(--warn)} .seg button.on.A{background:var(--danger)}
  .ck{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
  .ck input{accent-color:var(--go)}
  .btn{
    font-family:var(--disp);text-transform:uppercase;letter-spacing:.05em;font-weight:600;font-size:14px;
    background:var(--go);color:#04130d;border:0;border-radius:9px;padding:10px 18px;cursor:pointer
  }
  .btn:hover{filter:brightness(1.07)}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--ink);background:var(--panel-2)}
  .btn.warn{background:var(--warn);color:#1a1300}
  .btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:13px 16px;border-top:1px solid var(--line-soft)}
  .toolbar .spacer{flex:1}
  .note{font-size:12.5px;color:var(--muted)}
  .empty{padding:34px 16px;text-align:center;color:var(--muted)}
  .empty .big{font-family:var(--disp);font-size:18px;color:var(--ink);text-transform:uppercase;letter-spacing:.04em}
  .pickrow{display:grid;grid-template-columns:1fr 1.6fr auto;gap:10px;align-items:center;padding:9px 16px;border-bottom:1px solid var(--line-soft)}
  .pickrow .nm{font-weight:600}
  .pickrow .opts{display:flex;gap:12px;align-items:center}
  .warnbox{margin:0;padding:11px 16px;background:rgba(255,91,126,.08);border:1px solid rgba(255,91,126,.3);
    border-radius:10px;color:#ffc2cf;font-size:13.5px}
  .okbox{margin:0;padding:11px 16px;background:rgba(25,226,160,.08);border:1px solid rgba(25,226,160,.3);
    border-radius:10px;color:#bdf6e3;font-size:13.5px}
  .fixrow{display:grid;grid-template-columns:1fr auto 1fr auto;gap:10px;align-items:center;padding:8px 16px;border-bottom:1px solid var(--line-soft)}
  .fixrow .v{color:var(--faint);font-family:var(--disp);text-align:center}
  .strength{font-family:var(--num);font-size:11px;color:var(--faint)}
  .banlist{font-size:13px;color:var(--muted)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--raised);
    border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:10px;box-shadow:var(--shadow);
    font-size:14px;z-index:60;opacity:0;transition:opacity .2s, transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .srow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
  .trow{display:grid;grid-template-columns:1fr 84px auto;gap:8px;align-items:center}
  /* login overlay */
  .login{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(900px 400px at 50% -120px, rgba(25,226,160,.10), transparent 60%), rgba(4,7,14,.92);
    backdrop-filter:blur(4px)}
  .login-card{width:100%;max-width:340px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:22px;box-shadow:var(--shadow)}
  .login-crest{display:flex;align-items:center;gap:11px;margin-bottom:18px}
  .login-title{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:18px;line-height:1}
  .login-sub{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
  .login-lab{display:block;font-family:var(--disp);text-transform:uppercase;letter-spacing:.06em;
    font-size:11.5px;color:var(--faint);margin:12px 0 5px}
  .login-err{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}
  .season-item{display:block;width:100%;text-align:left;background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:11px 13px;cursor:pointer;color:var(--ink)}
  .season-item:hover{border-color:var(--go-dim);background:var(--raised)}
  .si-name{display:block;font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.02em}
  .si-cur{font-family:var(--body);font-size:10px;color:var(--go);border:1px solid var(--go-dim);border-radius:4px;
    padding:1px 5px;margin-left:6px;vertical-align:middle;text-transform:uppercase;letter-spacing:.08em}
  .si-sub{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
  .season-row{display:flex;gap:8px;align-items:stretch}
  .season-row .season-item{flex:1}
  .rulesbody{padding:6px 18px 18px;max-width:640px}
  .rulesbody h3{font-family:var(--disp);text-transform:uppercase;letter-spacing:.04em;font-size:16px;
    margin:22px 0 6px;color:var(--ink)}
  .rulesbody h3:first-child{margin-top:6px}
  .rulesbody p{margin:6px 0;color:var(--muted);font-size:14.5px;line-height:1.55}
  .rulesbody b{color:var(--ink)}
  .rulestag{font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--go);border:1px solid var(--go-dim);border-radius:5px;padding:1px 7px;margin-left:8px;vertical-align:middle}
  .rulestable{margin:8px 0;width:auto;max-width:360px}
  .rulestable td{border-bottom:1px solid var(--line-soft);padding:7px 16px 7px 0;font-size:14px}
  .rulestable td.num{font-family:var(--num);text-align:right;padding-right:0;color:var(--ink)}
  .ruleslist{margin:8px 0 4px;padding-left:22px;color:var(--muted);font-size:14.5px;line-height:1.6}
  .ruleslist li{margin-bottom:6px}
  .ruleslist b{color:var(--ink)}
  .fxbox{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .fxbox>summary{padding:13px 16px;cursor:pointer;font-family:var(--disp);text-transform:uppercase;letter-spacing:.05em;font-size:14px;list-style:none}
  .fxbox>summary::-webkit-details-marker{display:none}
  .fxbox>summary .note{text-transform:none;letter-spacing:0}
  .fxpair{display:grid;grid-template-columns:1fr auto 1fr auto;gap:8px;align-items:center}
  .fxpair .v{color:var(--faint);font-family:var(--disp);text-align:center}
  @media (max-width:680px){
    .row{grid-template-columns:24px 1fr 64px;gap:8px}
    .row .lives .pips{display:none}
    .row .wdl,.row .bans,.row.head .h-wdl,.row.head .h-bans{display:none}
    .pickrow{grid-template-columns:1fr;gap:7px}
    .fixrow{grid-template-columns:1fr auto 1fr;}
    .fixrow .seg{grid-column:1/-1}
  }
</style>
</head>
<body>
<header class="top">
  <div class="wrap mast">
    <svg class="crest" viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <path d="M32 4c4 9 13 9 22 11-6 7-4 17-9 25-4 6-9 11-13 19-4-8-9-13-13-19-5-8-3-18-9-25 9-2 18-2 22-11z" stroke="#19e2a0" stroke-width="2.4" stroke-linejoin="round"/>
      <circle cx="32" cy="30" r="7.5" fill="#0b1626" stroke="#eaf1fb" stroke-width="2"/>
      <path d="M32 23.5l2.4 1.8-.9 2.9h-3l-.9-2.9z" fill="#eaf1fb"/>
    </svg>
    <div class="title">
      <h1><span class="k">Kamikaze</span> Football</h1>
      <div class="sub">Premier League · Survival</div>
    </div>
    <div class="spacer"></div>
    <span id="dataChip" class="chip local"><span class="dot"></span><span id="dataChipText">Local data</span></span>
    <button id="signOut" class="btn ghost" style="display:none;padding:6px 12px;font-size:13px" onclick="signOutNow()">Sign out</button>
  </div>
</header>

<div class="wrap">
  <div class="gwbar">
    <span class="lab">Gameweek</span>
    <div class="gwstep">
      <button id="gwDown" title="Previous">‹</button>
      <span class="gwnum" id="gwNum">30</span>
      <button id="gwUp" title="Next">›</button>
    </div>
    <span class="gwstate" id="gwState"></span>
    <div class="spacer" style="flex:1"></div>
    <span class="chip" id="aliveChip"><span class="dot" style="background:var(--go)"></span><span id="aliveCount">—</span> alive</span>
  </div>

  <nav class="tabs" id="tabs">
    <button data-tab="standings" class="on">Standings</button>
    <button data-tab="picks">Enter picks</button>
    <button data-tab="resolve">Resolve</button>
    <button data-tab="limits">Squad limits</button>
    <button data-tab="season">Season</button>
    <button data-tab="rules">Rules</button>
  </nav>
</div>

<div class="login" id="login" style="display:none">
  <div class="login-card">
    <div class="login-crest">
      <svg viewBox="0 0 64 64" fill="none" width="34" height="34" aria-hidden="true">
        <path d="M32 4c4 9 13 9 22 11-6 7-4 17-9 25-4 6-9 11-13 19-4-8-9-13-13-19-5-8-3-18-9-25 9-2 18-2 22-11z" stroke="#19e2a0" stroke-width="2.4" stroke-linejoin="round"/>
        <circle cx="32" cy="30" r="7.5" fill="#0b1626" stroke="#eaf1fb" stroke-width="2"/>
      </svg>
      <div><div class="login-title">Kamikaze Football</div><div class="login-sub">Admin sign-in</div></div>
    </div>
    <label class="login-lab" for="liEmail">Email</label>
    <input id="liEmail" type="text" autocomplete="username" placeholder="you@example.com">
    <label class="login-lab" for="liPw">Password</label>
    <input id="liPw" type="password" autocomplete="current-password" placeholder="••••••••">
    <div class="login-err" id="liErr"></div>
    <button class="btn" id="liBtn" style="width:100%;margin-top:4px">Sign in</button>
    <p class="note" style="margin:12px 0 0;text-align:center">Only you have an account. Your browser stays signed in.</p>
  </div>
</div>

<div class="login" id="chooser" style="display:none">
  <div class="login-card" style="max-width:420px">
    <div class="login-crest">
      <svg viewBox="0 0 64 64" fill="none" width="34" height="34" aria-hidden="true">
        <path d="M32 4c4 9 13 9 22 11-6 7-4 17-9 25-4 6-9 11-13 19-4-8-9-13-13-19-5-8-3-18-9-25 9-2 18-2 22-11z" stroke="#19e2a0" stroke-width="2.4" stroke-linejoin="round"/>
        <circle cx="32" cy="30" r="7.5" fill="#0b1626" stroke="#eaf1fb" stroke-width="2"/>
      </svg>
      <div><div class="login-title">Kamikaze Football</div><div class="login-sub" id="chooserSub">Choose a season</div></div>
    </div>
    <div id="chooserBody"></div>
  </div>
</div>

<main class="wrap" id="view"></main>

<div class="toast" id="toast"></div>

/* ---------- 2. STORE (Firebase if configured, else in-memory) ------------ */
const SEED = JSON.parse(document.getElementById('seed').textContent);

const slug = label => String(label||'season').trim().replace(/[\/\s]+/g,'-').replace(/[^A-Za-z0-9_-]/g,'') || 'season';
function uniqueId(base){ let id=slug(base), n=2; while(root&&root.seasons&&root.seasons[id]){ id=slug(base)+'-'+(n++); } return id; }

function dataLive(on, text){
  const c = document.getElementById('dataChip');
  c.className = 'chip ' + (on ? 'live' : 'local');
  document.getElementById('dataChipText').textContent = text;
}
// coerce whatever's in storage into the {active, seasons} shape
function migrate(data){
  if(!data){ const id=slug(SEED.season); return {active:id, seasons:{[id]:structuredClone(SEED)}, _migrated:true}; }
  if(data.seasons) return data;                      // already multi-season
  const id = slug(data.season||'season');            // old flat single season -> wrap it
  return {active:id, seasons:{[id]:data}, _migrated:true};
}

async function initStore(){
  const configured = firebaseConfig.databaseURL && firebaseConfig.apiKey;
  if(!configured || typeof firebase === 'undefined'){
    root = migrate(null); activeId = root.active; state = root.seasons[activeId];
    dataLive(false, configured ? 'Firebase unreachable · local' : 'Local data (no sync)');
    showChooser(); render(); return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    firebase.auth().onAuthStateChanged(user=>{
      if(user){ hideLogin(); showSignOut(true); connectDb(); }
      else { showSignOut(false); dataLive(false, 'Sign in to sync'); hideChooser(); showLogin(); }
    });
  }catch(e){
    console.warn('Firebase init failed, staying local:', e);
    root = migrate(null); activeId = root.active; state = root.seasons[activeId];
    dataLive(false, 'Firebase error · local'); showChooser();
  }
  render();
}
let dbConnected=false;
async function connectDb(){
  if(dbConnected) return; dbConnected=true;
  try{
    fbRef = firebase.database().ref(DB_PATH);
    const snap = await fbRef.get();
    let data = migrate(snap.exists() ? snap.val() : null);
    if(data._migrated){ delete data._migrated; await fbRef.set(data); }   // persist new shape
    root = data;
    fbRef.on('value', s => {
      if(!s.exists()) return;
      root = s.val();
      if(activeId && root.seasons && root.seasons[activeId]){
        state = root.seasons[activeId];
        if(!chooserOpen()) render();
      }
    });
    dataLive(true, 'Firebase · synced');
    showChooser();                 // let me pick which season to work on
  }catch(e){
    console.warn('DB connect failed:', e);
    dbConnected=false;
    dataLive(false, 'No DB access · check rules');
  }
}

function save(){
  if(activeId && root && root.seasons){ root.seasons[activeId] = state; }
  if(fbRef && activeId){
    firebase.database().ref(`${DB_PATH}/seasons/${activeId}`).set(state).catch(e=>console.warn('save failed', e));
  }
  render();
}
function normaliseUsed(){ state.managers.forEach(m=>{ m.used = m.used||{}; m.picks = m.picks||{}; }); }

/* ---------- 3. RULES HELPERS -------------------------------------------- */
const teamByName = n => state.teams.find(t=>t.name===n);
const aliveManagers = () => state.managers.filter(m=>!m.eliminated);
function used(m,t){ return (m.used && m.used[t]) || 0; }
function isBanned(m,t){ return used(m,t) >= state.maxPicksPerTeam; }
function availableTeams(m){ return state.teams.filter(t=>!isBanned(m,t.name)); }
// each remaining pick on a team adds its position value — so a team you can
// still use twice counts twice, once if you've got one shot left on it
function remainingStrengthSum(m){
  // same scale as Picked Team Value: 21 minus league position, so Arsenal (pos 1) = 20.
  // each remaining pick on a team adds its value — so a team you can still use twice
  // counts twice. Higher total = stronger squad still in reserve.
  return state.teams.filter(t=>!isBanned(m,t.name)).reduce((s,t)=>{
    const left = state.maxPicksPerTeam - used(m,t.name);   // >=1, since banned teams are filtered out
    return s + (21 - t.strength)*left;
  },0);
}
// auto-pick: first away team (in fixture order) the manager hasn't used twice
function awayTeams(g){ return ((g&&g.fixtures)||[]).map(f=>f&&f.away).filter(Boolean); }
function autoPickTeam(m,g){
  for(const away of awayTeams(g)){ if(used(m,away) < state.maxPicksPerTeam) return away; }
  return null;
}
// fill in a team for every alive manager with no selection
function materializeAutos(g){
  g.picks = g.picks || {};
  aliveManagers().forEach(m=>{
    const p = g.picks[m.name];
    if(p && p.team) return;                       // real pick already in
    const auto = autoPickTeam(m,g);
    if(auto) g.picks[m.name] = {team:auto, auto:true, wildcard:(p&&p.wildcard)||false, drawcard:(p&&p.drawcard)||false};
  });
}
function gw(){ return state.currentGw; }
function gwObj(n, create){
  state.gameweeks = state.gameweeks || {};
  if(!state.gameweeks[n] && create) state.gameweeks[n] = {status:'open', fixtures:[], results:{}, picks:{}};
  return state.gameweeks[n];
}
function sortedStandings(){
  return [...state.managers].sort((a,b)=>{
    if(a.eliminated !== b.eliminated) return a.eliminated?1:-1;
    if(b.lives !== a.lives) return b.lives - a.lives;          // most lives
    if(a.losses !== b.losses) return a.losses - b.losses;       // fewest losses
    return remainingStrengthSum(b) - remainingStrengthSum(a);   // strongest remaining squad wins (highest value)
  });
}

// "Picked team value": for each resolved gameweek, score that week's pick by how
// strong the picked team was on the table *at the time* (using the locked-in
// tableSnapshot, not the current table) — 21 minus league position, so 1st = 20
// points, 20th = 1 point. Summed across the season. {total, count} — count is how
// many qualifying gameweeks went into it, so the stats page can hide it until
// someone's actually got a result on the board.
function pickedTeamValue(name){
  let total=0, count=0;
  Object.values(state.gameweeks||{}).forEach(g=>{
    if(g.status!=='resolved' || !g.tableSnapshot) return;
    const p = g.picks && g.picks[name];
    if(!p || !p.team) return;
    if(!g.results || !g.results[p.team]) return;
    const snap = g.tableSnapshot.find(t=>t.name===p.team);
    if(!snap) return;
    total += 21 - snap.strength;
    count++;
  });
  return {total, count};
}

// builds a clean, curated snapshot (no admin/internal fields) and pushes it
// to the public-readable path — players read this, never the real season data
async function publishPublicStats(){
  if(!fbRef) throw new Error("Not connected to Firebase — can't publish without it");
  const rows = sortedStandings().map((m,i)=>{
    const ptv = pickedTeamValue(m.name);
    return {
      name: m.name,
      lives: m.lives,
      eliminated: !!m.eliminated,
      wins: m.wins, draws: m.draws, losses: m.losses,
      wildcardUsed: !!m.wildcardUsed, wildcardResult: m.wildcardResult || null,
      drawcardUsed: !!m.drawcardUsed, drawcardResult: m.drawcardResult || null,
      bannedCount: state.teams.filter(t=>isBanned(m,t.name)).length,
      pickedTeamValue: ptv.total, pickedTeamValueCount: ptv.count
    };
  });
  const snapshot = {
    season: state.season || '',
    gw: gw(),
    aliveCount: aliveManagers().length,
    totalCount: state.managers.length,
    startingLives: state.startingLives || 15,
    maxPicksPerTeam: state.maxPicksPerTeam || 2,
    managers: rows,
    publishedAt: new Date().toISOString()
  };
  await firebase.database().ref(`${PUBLIC_PATH}/current`).set(snapshot);
}

/* ---------- 3b. FOOTBALL-DATA.ORG (via Cloudflare Worker proxy) --------- */

const FD_PROXY_URL = 'https://kamikaze-football-proxy.roughtfish.workers.dev/';

const FD_ALIASES = {
  'Arsenal':['arsenal fc'], 'Man City':['manchester city fc'], 'Liverpool':['liverpool fc'],
  'Man Utd':['manchester united fc'], 'Aston Villa':['aston villa fc'], 'Chelsea':['chelsea fc'],
  'Newcastle':['newcastle united fc'], 'Bournemouth':['afc bournemouth'],
  'Spurs':['tottenham hotspur fc'], 'Brighton':['brighton & hove albion fc','brighton and hove albion fc'],
  'Crystal Palace':['crystal palace fc'], 'Sunderland':['sunderland afc'], 'Fulham':['fulham fc'],
  'Everton':['everton fc'], 'Brentford':['brentford fc'], 'Leeds':['leeds united fc'],
  'Notts Forest':['nottingham forest fc'], 'Ipswich':['ipswich town fc'],
  'Hull City':['hull city afc'], 'Coventry':['coventry city fc'],
  'West Ham':['west ham united fc'], 'Burnley':['burnley fc'],
  'Wolves':['wolverhampton wanderers fc']
};
function fdToOurName(fdName){
  const norm = String(fdName||'').trim().toLowerCase();
  for(const [our,aliases] of Object.entries(FD_ALIASES)){
    if(aliases.includes(norm)) return our;
  }
  for(const [our,aliases] of Object.entries(FD_ALIASES)){
    if(aliases.some(a=>norm.includes(a)||a.includes(norm))) return our;
  }
  return null;
}
function outcomeFromScore(myScore, theirScore){
  if(myScore>theirScore) return 'W'; if(myScore<theirScore) return 'L'; return 'D';
}
// short codes for the share image
const TEAM_CODES = {
  'Arsenal':'ARS','Man City':'MCI','Liverpool':'LIV','Man Utd':'MUN','Aston Villa':'AVL',
  'Chelsea':'CHE','Newcastle':'NEW','Bournemouth':'BOU','Spurs':'TOT','Brighton':'BHA',
  'Crystal Palace':'CRY','Sunderland':'SUN','Fulham':'FUL','Everton':'EVE','Brentford':'BRE',
  'Leeds':'LEE','Notts Forest':'NFO','Ipswich':'IPS','Hull City':'HUL','Coventry':'COV',

  if(TEAM_CODES[name]) return TEAM_CODES[name];
  return String(name||'').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase() || '?';
}
let _h2cLoading=null;
function ensureHtml2Canvas(){
  if(window.html2canvas) return Promise.resolve();
  if(_h2cLoading) return _h2cLoading;
  _h2cLoading = new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=resolve; s.onerror=()=>reject(new Error('Could not load image renderer'));
    document.head.appendChild(s);
  });
  return _h2cLoading;
}
function crestBadge(name, crestUrl){
  if(crestUrl){
    const proxied = `${FD_PROXY_URL}?crest=${encodeURIComponent(crestUrl)}`;
    return `<img src="${proxied}" crossorigin="anonymous" class="crestimg" style="width:28px;height:28px;object-fit:contain;flex-shrink:0;" alt="${name||''}">`;
  }
  return `<div style="width:28px;height:28px;border-radius:50%;background:#16223a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#8ea0c0;flex-shrink:0;">${teamCode(name)}</div>`;
}
function fmtDay(iso){
  if(!iso) return null;
  return new Date(iso).toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', timeZone:'Europe/London'});
}
function fmtTime(iso){
  if(!iso) return '';
  return new Date(iso).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', timeZone:'Europe/London'});
}
// builds an offscreen card, waits for any crest images to load, snapshots it
// to a PNG, then shares (mobile) or downloads (fallback) it.
async function exportCardAsShare(innerHtml, filename, shareTitle){
  await ensureHtml2Canvas();
  const card = document.createElement('div');
  card.style.cssText = 'position:fixed;left:-9999px;top:0;width:460px;background:#101a2c;'+
    'font-family:Barlow,system-ui,sans-serif;padding:24px;border-radius:16px;color:#eaf1fb;';
  card.innerHTML = innerHtml;
  document.body.appendChild(card);
  // wait for crest images to actually load (or fail) before snapshotting
  const imgs = [...card.querySelectorAll('.crestimg')];
  await Promise.all(imgs.map(img=>img.complete ? Promise.resolve() :
    new Promise(res=>{ img.onload=res; img.onerror=res; })));
  const canvas = await html2canvas(card, {backgroundColor:'#101a2c', scale:2, useCORS:true});
  document.body.removeChild(card);
  const blob = await new Promise(res=>canvas.toBlob(res,'image/png'));
  const file = new File([blob], filename, {type:'image/png'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({files:[file], title:shareTitle});
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = file.name;
    document.body.appendChild(a); a.click(); a.remove();
    toast('Image downloaded — attach it to WhatsApp');
  }
}
async function shareFixturesImage(gwNum, fixtures){
  if(!fixtures || !fixtures.length){ toast('No fixtures to share yet'); return; }
  try{
    let lastDay=null;
    const rows = fixtures.map(f=>{
      const day = fmtDay(f.kickoff);
      let header='';
      if(day && day!==lastDay){
        header = `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#19e2a0;padding:${lastDay?'14px':'2px'} 0 6px;">${day}</div>`;

// pulls the live PL table and sets each team's "strength" to its current league position
// (1 = top). Lower summed position among a manager's *remaining* teams then correctly
// means "still has strong teams in reserve" — matching the rulebook tiebreak exactly.
async function fetchLiveTable(){
  const res = await fetch(`${FD_PROXY_URL}?table=1`);
  if(!res.ok) throw new Error(`Table proxy returned ${res.status}`);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  const totalTable = (data.standings||[]).find(s=>s.type==='TOTAL');
  const rows = totalTable ? totalTable.table : [];
  let unmatched = 0, matched = 0;
  rows.forEach(r=>{
    const our = fdToOurName(r.team && r.team.name);
    if(!our){ unmatched++; return; }
    const t = state.teams.find(x=>x.name===our);
    if(t){ t.strength = r.position; matched++; }
  });
  state.tableUpdatedAt = new Date().toISOString();
  save();
  return {matched, unmatched, total: rows.length};
}
// returns {events:[{home,away,homeScore,awayScore,finished}], unmatched:Number} or throws
async function tsdbFetchRound(roundNum){
  const res = await fetch(`${FD_PROXY_URL}?matchday=${roundNum}`);
  if(!res.ok) throw new Error(`Fixture proxy returned ${res.status}`);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  const raw = data && data.matches ? data.matches : [];
  let unmatched = 0;
  const events = raw.map(m=>{
    const home = fdToOurName(m.homeTeam && m.homeTeam.name), away = fdToOurName(m.awayTeam && m.awayTeam.name);
    if(!home || !away){ unmatched++; return null; }
    const ft = m.score && m.score.fullTime;
    const hs = ft ? ft.home : null, as = ft ? ft.away : null;
    const finished = m.status === 'FINISHED' && hs!==null && as!==null;
    return {home, away, homeScore: finished?+hs:null, awayScore: finished?+as:null, finished,
      homeCrest: (m.homeTeam && m.homeTeam.crest) || null,
      awayCrest: (m.awayTeam && m.awayTeam.crest) || null,
      kickoff: m.utcDate || null};
  }).filter(Boolean);
  return {events, unmatched, total: raw.length};
}

    else g.picks[name] = {team:v, wildcard:wild, drawcard:draw};

  const teamsToRate = state.teams.filter(t=>picked.has(t.name))

    const pickers = Object.entries(g.picks||{})
      .filter(([,p])=>p.team===t.name)
      .map(([name,p])=>{
        const flags = [p.auto?'auto':'', p.wildcard?'WC':'', p.drawcard?'DC':''].filter(Boolean).join(' ');
        return flags ? `${name} (${flags})` : name;
      }).join(', ');
    html += `<div class="fixrow" data-team="${t.name}">
      <span class="nm">${t.name} <span class="strength">str ${t.strength}</span>
        <span class="strength" style="display:block;margin-top:2px;">${pickers}</span></span>
      <span></span><span></span>
      <span class="seg">
        <button class="rW ${r==='W'?'on H':''}" data-r="W">Win</button>
        <button class="rD ${r==='D'?'on D':''}" data-r="D">Draw</button>
        <button class="rL ${r==='L'?'on A':''}" data-r="L">Loss</button>

  });

  const noTeam = aliveManagers().filter(m=>{ const p=g.picks[m.name]; return !(p&&p.team); }).map(m=>m.name);
  html += `<div style="padding:12px 16px">`;
  if(noTeam.length){
    html += `<div class="warnbox">No team for ${noTeam.join(', ')} — no pick was entered and the fixture list

  }
  html += `</div>`;
  html += `<div class="toolbar">
      <button class="btn" id="applyGw">Apply gameweek ${n}</button>
      <span class="note" id="resCount"></span>
      <span class="spacer"></span>
      <button class="btn ghost" id="backPicks">‹ Picks</button>
    </div></div>`;

  // live preview of what applying will do
  html += renderPreview(g);

  view.querySelectorAll('.fixrow .seg button').forEach(b=>{
    b.onclick = ()=>{
      const team = b.closest('.fixrow').dataset.team;
      g.results[team] = b.dataset.r; save();   // re-renders, keeps it simple
      setTab('resolve');
    };

  document.getElementById('applyGw').onclick = ()=>applyGameweek(n);
  document.getElementById('backPicks').onclick = ()=>setTab('picks');
  document.getElementById('fetchRes').onclick = async ()=>{
    const note=document.getElementById('resFetchNote'); note.textContent='Fetching…';
    try{
      const {events, unmatched, total} = await tsdbFetchRound(n);
      if(!events.length){
        note.textContent = total ? `Found ${total} fixtures but couldn't match any team names.` : 'No fixtures found for that round/season yet.';
        return;

        if(picked.has(e.away)){ g.results[e.away] = outcomeFromScore(e.awayScore, e.homeScore); set++; }
      });
      save();
      toast(`Set ${set} result${set===1?'':'s'}${pending?` · ${pending} not finished yet`:''}${unmatched?` · ${unmatched} unmatched`:''}`);
      setTab('resolve');

}
function readPicksLeniently(g){ g.picks = g.picks || {}; } // picks already saved via savePicks

function effect(p, result){
  // returns {delta, outcome:'W'|'D'|'L', note}
  if(p.drawcard){
    if(result==='D') return {delta:+1, outcome:'D', note:'drawcard hit (+1)'};
    return {delta:-1, outcome:result, note:'drawcard miss (-1)'};
  }
  if(result==='W') return {delta:0, outcome:'W', note:''};
  if(result==='D') return p.wildcard ? {delta:0, outcome:'D', note:'wildcard (draw saved)'}
                                     : {delta:-1, outcome:'D', note:''};
  return {delta:-2, outcome:'L', note:''};
}
function renderPreview(g){
  const rows = Object.entries(g.picks||{}).filter(([,p])=>p.team).map(([name,p])=>{
    const m = state.managers.find(x=>x.name===name);
    const flags = [p.auto?'AUTO':'', p.wildcard?'WC':'', p.drawcard?'DC':''].filter(Boolean).join(' ');
    const nameCell = `${name} ${flags?`<span class="strength">${flags}</span>`:''}`;
    const res = g.results[p.team];
    if(!res) return `<tr><td>${nameCell}</td><td>${p.team}</td><td class="num">—</td><td class="num">—</td><td>${m.lives}</td></tr>`;
    const e = effect(p, res);
    const nl = m.lives + e.delta;
    const cls = e.delta>0?'go':e.delta<0?'danger':'';
    return `<tr>
      <td>${nameCell}</td>
      <td>${p.team}</td>
      <td class="num">${res}</td>
      <td class="num" style="color:var(--${cls||'muted'})">${e.delta>0?'+':''}${e.delta}</td>
      <td class="num">${m.lives} → <b style="color:var(--${nl<0?'danger':nl<=2?'warn':'go'})">${nl}</b>${nl<0?' ☠':''}</td>
    </tr>`;
  }).join('');
  if(!rows) return '';
  return `<div class="panel"><div class="phead"><h2>Preview</h2><span class="hint">what “Apply” will do</span></div>
    <table class="grid"><thead><tr><th>Manager</th><th>Team</th><th class="num">Res</th><th class="num">Δ</th><th class="num">Lives</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
function applyGameweek(n){
  const g = gwObj(n, true);
  materializeAutos(g);                       // no-shows get their auto away team
  // lock in the league table as it stood entering this gameweek, once — re-resolving
  // or undoing later never overwrites it, so "picked team value" stays historically honest
  if(!g.tableSnapshot){
    g.tableSnapshot = state.teams.map(t=>({name:t.name, strength:t.strength}));
  }
  const picks = Object.entries(g.picks||{}).filter(([,p])=>p.team);
  // snapshot for undo
  g._undo = state.managers.map(m=>({name:m.name, lives:m.lives, wins:m.wins, draws:m.draws,
            losses:m.losses, eliminated:m.eliminated, wildcardUsed:m.wildcardUsed,
            drawcardUsed:m.drawcardUsed, wildcardResult:m.wildcardResult, drawcardResult:m.drawcardResult,
            used:structuredClone(m.used)}));
  picks.forEach(([name,p])=>{
    const m = state.managers.find(x=>x.name===name);
    const res = g.results[p.team]; if(!res) return;
    const e = effect(p, res);
    m.lives += e.delta;
    if(e.outcome==='W') m.wins++; else if(e.outcome==='D') m.draws++; else m.losses++;
    m.used[p.team] = used(m,p.team) + 1;
    // both cards key off "was it a draw" — record the actual result so success/fail is known later
    if(p.wildcard){ m.wildcardUsed = true; m.wildcardResult = res; }
    if(p.drawcard){ m.drawcardUsed = true; m.drawcardResult = res; }
    if(m.lives <= 0) m.eliminated = true;
  });
  g.status = 'resolved';
  state.currentGw = n + 1;
  save();
  toast(`Gameweek ${n} applied`);
  setTab('standings');
  autoPublishStats();
}
// fire-and-forget publish, used after actions that change what players see —
// failures don't interrupt the admin action, just surface quietly via console
function autoPublishStats(){
  publishPublicStats().catch(e=>console.warn('auto-publish failed:', e));
}
function undoGameweek(n){
  const g = gwObj(n); if(!g || !g._undo){ toast('Nothing to undo'); return; }
  g._undo.forEach(s=>{
    const m = state.managers.find(x=>x.name===s.name);
    Object.assign(m, {lives:s.lives, wins:s.wins, draws:s.draws, losses:s.losses,
      eliminated:s.eliminated, wildcardUsed:s.wildcardUsed, drawcardUsed:s.drawcardUsed,
      wildcardResult:s.wildcardResult, drawcardResult:s.drawcardResult,
      used:structuredClone(s.used)});
  });
  delete g._undo; g.status = 'open'; state.currentGw = n;
  save(); toast(`Gameweek ${n} reopened`); setTab('resolve');
  autoPublishStats();
}

          <tr><td>Team <b>draws</b></td><td class="num">&minus;1 life</td></tr>

        <p>If a manager doesn't get a pick in before the deadline, they're not skipped — they're auto-assigned the
        <b>first away team</b> on that gameweek's fixture list that they haven't already used twice. If their first
        away team is banned, it moves to the next one, and so on down the list.</p>

        <p>If it comes down to a tie at the end of the season, it's settled in this order:</p>
        <ol class="ruleslist">
          <li>Last manager standing wins outright.</li>
          <li>Otherwise, most lives remaining.</li>
          <li>Still tied? Fewest losses.</li>
          <li>Still tied? Highest summed <b>value</b> of each manager's remaining (still-pickable) teams — each
          team's value is 21 minus its live league position (1st place = 20 points), same scale used for "Picked
          team value" on the player stats page. Each remaining pick on a team counts separately, so a team you can
          still use twice counts twice toward the total. Highest total wins — whoever's still got the strongest

        </ol>

      </div></div>`;
}

function deleteSeason(id){
  if(!root || !root.seasons || !root.seasons[id]) return;
  const s = root.seasons[id];
  const label = s.season || id;
  const totalSeasons = Object.keys(root.seasons).length;
  if(totalSeasons <= 1){ alert("Can't delete your only season — start a new one first if you want to replace it."); return; }
  if(!confirm(`Delete "${label}" permanently?\n\n${seasonSummary(s)}\nThis can't be undone. Download a backup first if you want to keep a copy — open "${label}" and use the backup button on the Season tab.`)) return;
  delete root.seasons[id];
  if(fbRef){ firebase.database().ref(`${DB_PATH}/seasons/${id}`).remove().catch(()=>{}); }
  // if we just deleted the active season, fall back to whatever's left
  if(root.active === id){
    const remaining = Object.keys(root.seasons);
    root.active = remaining[0];
    activeId = root.active; state = root.seasons[activeId];
    if(fbRef){ firebase.database().ref(`${DB_PATH}/active`).set(activeId).catch(()=>{}); }
  }
  toast(`Deleted ${label}`);
  renderChooser();
}
function loadSeason(id){
  if(!root || !root.seasons || !root.seasons[id]) return;
  activeId=id; state=root.seasons[id]; root.active=id;
  if(fbRef){ firebase.database().ref(`${DB_PATH}/active`).set(id).catch(()=>{}); }
  hideChooser(); setTab('standings'); toast(`Loaded ${state.season||id}`);
  autoPublishStats();
}
function createSeason(label, names){
  const fresh = {
    season: label, startingLives:15, maxPicksPerTeam:2, currentGw:1,
    teams: PL_2627.map(t=>({...t})),
    managers: names.map(name=>({name, lives:15, wins:0, draws:0, losses:0,
      eliminated:false, wildcardUsed:false, drawcardUsed:false, used:{}, picks:{}})),
    gameweeks:{}
  };
  const id = uniqueId(label);
  root = root || {seasons:{}}; root.seasons = root.seasons || {};
  root.seasons[id]=fresh; root.active=id; activeId=id; state=fresh;
  if(fbRef){
    firebase.database().ref(`${DB_PATH}/seasons/${id}`).set(fresh).catch(e=>console.warn(e));
    firebase.database().ref(`${DB_PATH}/active`).set(id).catch(()=>{});
  }
  hideChooser(); setTab('standings'); toast(`${label} season started`);
  autoPublishStats();
}

/* Season tab — current season + open the chooser + backup */
function renderSeason(){
  view.innerHTML = `
    <div class="panel"><div class="phead"><h2>Season</h2><span class="hint">${state.season||'—'}</span></div>
      <div style="padding:14px 16px;display:grid;gap:12px">
        <div class="okbox">Loaded: <b>${state.season||'—'}</b> · ${seasonSummary(state)}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn" id="switchSeason">Switch or start a season</button>
          <button class="btn ghost" id="backup">Download backup (.json)</button>
        </div>
        <p class="note">“Switch or start a season” opens the same chooser you get at login — load a past season or begin a new one. Starting a new season keeps the others intact.</p>
      </div></div>`;
  document.getElementById('switchSeason').onclick=()=>showChooser('list');
  document.getElementById('backup').onclick=exportBackup;
}
function exportBackup(){
  try{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`kamikaze-${(state.season||'season').replace(/\//g,'-')}-backup.json`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
    toast('Backup downloaded');
  }catch(e){ alert('Backup failed: '+e.message); }
}


/* ---------- 5. CHROME / EVENTS ------------------------------------------ */
function setTab(t){
  activeTab = t;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  render();
}
document.getElementById('tabs').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(b) setTab(b.dataset.tab);
});
document.getElementById('gwUp').onclick = ()=>{ state.currentGw++; render(); };
document.getElementById('gwDown').onclick = ()=>{ if(state.currentGw>1){ state.currentGw--; render(); } };
document.getElementById('liBtn').onclick = signIn;
['liEmail','liPw'].forEach(id=>document.getElementById(id)
  .addEventListener('keydown', e=>{ if(e.key==='Enter') signIn(); }));

let toastTimer;
function toast(msg){
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---------- 6. BOOT ----------------------------------------------------- */
// load Firebase only if a config is present
(function boot(){
  const configured = firebaseConfig.databaseURL && firebaseConfig.apiKey;
  if(configured){
    const urls=[
      'https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js',
      'https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js',
      'https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'
    ];
    (function load(i){
      if(i>=urls.length){ initStore(); return; }
      const s=document.createElement('script'); s.src=urls[i];
      s.onload=()=>load(i+1); s.onerror=()=>load(i+1);
      document.head.appendChild(s);
    })(0);
  } else {
    initStore();
  }
})();
</script>
