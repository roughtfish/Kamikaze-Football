<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kamikaze Football · Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080d18; --panel:#101a2c; --panel-2:#16223a; --raised:#1d2c49;
    --line:#283a5c; --line-soft:#1c2a44;
    --ink:#eaf1fb; --muted:#8ea0c0; --faint:#5e7095;
    --go:#19e2a0; --go-dim:#0e7d5c; --warn:#ffc043; --danger:#ff5b7e;
    --shadow:0 1px 0 rgba(255,255,255,.03), 0 12px 30px -18px rgba(0,0,0,.8);
    --disp:'Barlow Condensed', system-ui, sans-serif;
    --body:'Barlow', system-ui, -apple-system, sans-serif;
    --num:ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1200px 500px at 50% -200px, rgba(25,226,160,.07), transparent 60%), var(--bg);
    color:var(--ink); font-family:var(--body); font-size:15px; line-height:1.45;
    -webkit-font-smoothing:antialiased; padding-bottom:48px;
  }
  .wrap{max-width:640px; margin:0 auto; padding:0 16px}
  header.top{border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg, rgba(16,26,44,.9), rgba(8,13,24,.4));
    position:sticky; top:0; z-index:10; backdrop-filter:blur(8px)}
  .mast{display:flex; align-items:center; gap:14px; padding:14px 0}
  .crest{width:34px;height:34px;flex:0 0 auto;filter:drop-shadow(0 0 10px rgba(25,226,160,.3))}
  .title h1{font-family:var(--disp); font-weight:700; letter-spacing:.04em; margin:0;
    font-size:21px; line-height:1; text-transform:uppercase}
  .title h1 .k{color:var(--go)}
  .title .sub{font-size:11.5px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-top:3px}
  .mast .spacer{flex:1}
  .chip{font-family:var(--disp); text-transform:uppercase; letter-spacing:.06em; font-size:11.5px;
    padding:5px 10px; border-radius:999px; border:1px solid var(--line); color:var(--muted);
    display:inline-flex; align-items:center; gap:7px; white-space:nowrap}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--go); box-shadow:0 0 8px var(--go)}
  main{padding-top:18px}
  .panel{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;box-shadow:var(--shadow)}
  .panel + .panel{margin-top:16px}
  .phead{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
  .phead h2{font-family:var(--disp);text-transform:uppercase;letter-spacing:.05em;font-size:16px;margin:0}
  .phead .hint{font-size:12.5px;color:var(--muted);margin-left:auto}
  .board{padding:6px 8px 12px; overflow-x:auto}
  .row{display:grid;grid-template-columns:28px 1fr 60px auto;align-items:center;
    gap:10px;padding:9px 10px;border-radius:10px}
  .row.head{color:var(--faint);font-family:var(--disp);text-transform:uppercase;letter-spacing:.08em;
    font-size:11px;padding-bottom:4px}
  .row.mgr + .row.mgr{border-top:1px solid var(--line-soft)}
  .rank{font-family:var(--disp);font-weight:700;font-size:17px;color:var(--faint);text-align:center}
  .rank.lead{color:var(--go)}
  .who{display:flex;align-items:center;gap:8px;min-width:0}
  .who .nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cards{display:flex;gap:3px}
  .cpip{font-family:var(--disp);font-size:9.5px;font-weight:700;border-radius:4px;padding:1px 4px;
    border:1px solid var(--line);color:var(--faint)}
  .cpip.ok{border-color:var(--go-dim);color:var(--go);background:rgba(25,226,160,.08)}
  .cpip.bad{border-color:var(--danger);color:var(--danger);background:rgba(255,91,126,.08)}
  .cpip.used{border-color:var(--line);color:var(--muted);background:var(--panel-2)}
  .wdl{font-family:var(--num);font-size:12.5px;color:var(--muted);text-align:center}
  .wdl b{color:var(--ink)}
  .lifenum{font-family:var(--num);font-size:16px;font-weight:600;text-align:right}
  .lifenum.go{color:var(--go)} .lifenum.warn{color:var(--warn)} .lifenum.danger{color:var(--danger)}
  .lives{display:flex;align-items:center;gap:8px;justify-content:flex-end}
  .pips{display:flex;gap:2px;flex-wrap:nowrap}
  .pip{width:5px;height:14px;border-radius:2px;background:var(--line)}
  .pip.on{background:var(--go)} .pip.warn{background:var(--warn)} .pip.danger{background:var(--danger)}
  .row.out{opacity:.5}
  .row.out .nm{text-decoration:line-through}
  .sep{display:flex;align-items:center;gap:10px;color:var(--faint);font-family:var(--disp);
    text-transform:uppercase;letter-spacing:.1em;font-size:11px;padding:14px 12px 6px}
  .sep::after{content:"";flex:1;height:1px;background:var(--line-soft)}
  .empty{padding:48px 16px;text-align:center;color:var(--muted)}
  .empty .big{font-family:var(--disp);font-size:18px;color:var(--ink);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .legend{padding:12px 16px;font-size:12px;color:var(--faint);border-top:1px solid var(--line-soft)}
  .footnote{text-align:center;color:var(--faint);font-size:12px;margin-top:18px}
  nav.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line-soft)}
  nav.tabs button{background:none;border:0;color:var(--muted);font-family:var(--disp);
    text-transform:uppercase;letter-spacing:.06em;font-size:14px;font-weight:600;
    padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent}
  nav.tabs button.on{color:var(--ink);border-bottom-color:var(--go)}
  .rulesbody{padding:6px 18px 18px;max-width:640px}
  .rulesbody h3{font-family:var(--disp);text-transform:uppercase;letter-spacing:.04em;font-size:16px;
    margin:22px 0 6px;color:var(--ink)}
  .rulesbody h3:first-child{margin-top:6px}
  .rulesbody p{margin:6px 0;color:var(--muted);font-size:14.5px;line-height:1.55}
  .rulesbody b{color:var(--ink)}
  .rulestag{font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--go);border:1px solid var(--go-dim);border-radius:5px;padding:1px 7px;margin-left:8px;vertical-align:middle}
  .rulestable{margin:8px 0;width:auto;max-width:360px;border-collapse:collapse}
  .rulestable td{border-bottom:1px solid var(--line-soft);padding:7px 16px 7px 0;font-size:14px}
  .rulestable td.num{font-family:var(--num);text-align:right;padding-right:0;color:var(--ink)}
  .ruleslist{margin:8px 0 4px;padding-left:22px;color:var(--muted);font-size:14.5px;line-height:1.6}
  .ruleslist li{margin-bottom:6px}
  .ruleslist b{color:var(--ink)}
  @media (max-width:480px){
    .row{grid-template-columns:20px 1fr 50px auto}
    .row .wdl, .row.head .h-wdl{display:none}
    .pip{width:4px;height:13px}
  }
</style>
</head>
<body>
<header class="top">
  <div class="wrap mast">
    <svg class="crest" viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <path d="M32 4c4 9 13 9 22 11-6 7-4 17-9 25-4 6-9 11-13 19-4-8-9-13-13-19-5-8-3-18-9-25 9-2 18-2 22-11z" stroke="#19e2a0" stroke-width="2.4" stroke-linejoin="round"/>
      <circle cx="32" cy="30" r="7.5" fill="#0b1626" stroke="#eaf1fb" stroke-width="2"/>
      <path d="M32 23.5l2.4 1.8-.9 2.9h-3l-.9-2.9z" fill="#eaf1fb"/>
    </svg>
    <div class="title">
      <h1><span class="k">Kamikaze</span> Football</h1>
      <div class="sub">Player stats</div>
    </div>
    <div class="spacer"></div>
    <span class="chip" id="liveChip"><span class="dot"></span>Live</span>
  </div>
  <div class="wrap">
    <nav class="tabs" id="tabs">
      <button data-tab="stats" class="on">Stats</button>
      <button data-tab="rules">Rules</button>
    </nav>
  </div>
</header>

<main class="wrap" id="view">
  <div class="empty"><div class="big">Loading…</div></div>
</main>

<script>
let latestSnap = null;
let activeTab = 'stats';
/* ---------- paste the same firebaseConfig as your admin console --------- */
const firebaseConfig = {
  apiKey: "AIzaSyCUda8nxOMprPFEiz8YoG3Zd0GvItdUw-Q",
  authDomain: "kamikaze-football.firebaseapp.com",
  databaseURL: "https://kamikaze-football-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kamikaze-football",
  storageBucket: "kamikaze-football.firebasestorage.app",
  messagingSenderId: "669421775592",
  appId: "1:669421775592:web:95a01da6a06059b579b75d",
  measurementId: "G-7TE11W1DBX"
};
const PUBLIC_PATH = 'kamikaze_pl_public';   // matches the admin console's PUBLIC_PATH

const view = document.getElementById('view');

function cardPip(label, usedFlag, result){
  if(!usedFlag) return `<span class="cpip">${label}</span>`;
  if(result===undefined || result===null) return `<span class="cpip used">${label}</span>`;
  const ok = result === 'D';
  return `<span class="cpip ${ok?'ok':'bad'}">${label}${ok?'✓':'✗'}</span>`;
}

function render(snap){
  latestSnap = snap;
  if(activeTab==='rules'){ renderRulesPage(); return; }
  renderStats(snap);
}
function renderStats(snap){
  if(!snap){
    view.innerHTML = `<div class="empty"><div class="big">No stats published yet</div>
      <p>Check back once the admin's published the latest standings.</p></div>`;
    return;
  }
  const startingLives = (latestSnap && latestSnap.startingLives) || 15;
  function pip(i, lives){
    let cls='pip';
    if(i<lives){ cls += lives<=2 ? ' danger' : lives<=5 ? ' warn' : ' on'; }
    return `<span class="${cls}"></span>`;
  }
  const rows = (snap.managers||[]);
  let aliveRank = 0, firstDead = true, rowsHtml = '';
  rowsHtml += `<div class="row head"><span>#</span><span>Manager</span><span class="h-wdl">W·D·L</span><span style="text-align:right">Lives</span></div>`;
  rows.forEach(m=>{
    if(m.eliminated && firstDead){ rowsHtml += `<div class="sep">Eliminated</div>`; firstDead=false; }
    if(!m.eliminated) aliveRank++;
    const L = m.lives;
    const lifeCls = L<=2 ? 'danger' : L<=5 ? 'warn' : 'go';
    const pips = Array.from({length:startingLives}, (_,i)=>pip(i, L)).join('');
    rowsHtml += `<div class="row mgr ${m.eliminated?'out':''}">
      <span class="rank ${(!m.eliminated && aliveRank===1)?'lead':''}">${m.eliminated?'–':aliveRank}</span>
      <span class="who"><span class="nm">${m.name}</span>
        <span class="cards">${cardPip('WC', m.wildcardUsed, m.wildcardResult)}${cardPip('DC', m.drawcardUsed, m.drawcardResult)}</span>
      </span>
      <span class="wdl"><b>${m.wins}</b>·${m.draws}·${m.losses}</span>
      <span class="lives"><span class="pips">${pips}</span><span class="lifenum ${lifeCls}">${L}</span></span>
    </div>`;
  });
  const published = snap.publishedAt ? new Date(snap.publishedAt).toLocaleString('en-GB',
    {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';

  // Picked Team Value — only managers with at least one qualifying gameweek
  const ptvRows = rows.filter(m=>(m.pickedTeamValueCount||0) > 0)
    .sort((a,b)=>(b.pickedTeamValue||0)-(a.pickedTeamValue||0));
  let ptvHtml = '';
  if(ptvRows.length){
    ptvHtml = `<div class="panel">
      <div class="phead"><h2>Picked team value</h2>
        <span class="hint">Strength of teams picked, scored against the table at the time</span></div>
      <div class="board">
        <div class="row head" style="grid-template-columns:28px 1fr 80px"><span>#</span><span>Manager</span><span style="text-align:right">Value</span></div>
        ${ptvRows.map((m,i)=>`
          <div class="row mgr" style="grid-template-columns:28px 1fr 80px">
            <span class="rank ${i===0?'lead':''}">${i+1}</span>
            <span class="who"><span class="nm">${m.name}</span></span>
            <span class="lifenum go" style="font-size:15px">${m.pickedTeamValue}</span>
          </div>`).join('')}
      </div>
      <div class="legend">Each pick scores 21 minus the picked team's league position at that gameweek (1st = 20pts, 20th = 1pt), summed across the season. Higher = stronger picks on average.</div>
    </div>`;
  }

  view.innerHTML = `
    <div class="panel">
      <div class="phead"><h2>${snap.season||'Standings'}</h2>
        <span class="hint">Gameweek ${snap.gw||'—'} · ${snap.aliveCount||0}/${snap.totalCount||0} alive</span></div>
      <div class="board">${rowsHtml}</div>
      <div class="legend">WC = Wildcard · DC = Drawcard · ✓ successful (drew) · ✗ unsuccessful · outline = not used yet</div>
    </div>
    ${ptvHtml}
    <p class="footnote">Last updated ${published}</p>`;
}

function renderRulesPage(){
  const lives = (latestSnap && latestSnap.startingLives) || 15;
  const maxPicks = (latestSnap && latestSnap.maxPicksPerTeam) || 2;
  view.innerHTML = `
    <div class="panel"><div class="phead"><h2>How it works</h2>
      <span class="hint">${(latestSnap&&latestSnap.season)||''} · ${lives} lives · max ${maxPicks} picks per team</span></div>
      <div class="rulesbody">

        <h3>The basics</h3>
        <p>Every manager starts the season with <b>${lives} lives</b>. Each gameweek, you pick one
        Premier League team to win. What happens to your lives depends on the result:</p>
        <table class="grid rulestable">
          <tr><td>Team <b>wins</b></td><td class="num">No life lost</td></tr>
          <tr><td>Team <b>draws</b></td><td class="num">&minus;1 life</td></tr>
          <tr><td>Team <b>loses</b></td><td class="num">&minus;2 lives</td></tr>
        </table>
        <p>Reach <b>0 lives</b> and you're eliminated. Whoever's standing last wins.</p>

        <h3>Team limits</h3>
        <p>Each team can be picked a <b>maximum of ${maxPicks} times</b> by any one manager. Use it up,
        and it's banned for you for the rest of the season — though other managers can still pick it.</p>

        <h3>Wildcard <span class="rulestag">once per season</span></h3>
        <p>Play it alongside a pick to insure against a draw. If your team draws, you keep the life you'd otherwise
        lose. If it wins or loses, the Wildcard has no effect — and it's gone either way.</p>

        <h3>Drawcard <span class="rulestag">once per season</span></h3>
        <p>A side bet on the result being a draw, played alongside your normal pick:</p>
        <table class="grid rulestable">
          <tr><td>Game <b>draws</b></td><td class="num">+1 life</td></tr>
          <tr><td>Game is a <b>win or loss</b></td><td class="num">&minus;1 life</td></tr>
        </table>
        <p>It's used the moment you play it, whatever the result.</p>
        <p class="note">Wildcard and Drawcard can't both be played on the same pick in the same week.</p>

        <h3>Missed picks</h3>
        <p>If a manager doesn't get a pick in before the deadline, they're not skipped — they're auto-assigned the
        <b>first away team</b> on that gameweek's fixture list that they haven't already used twice. If their first
        away team is banned, it moves to the next one, and so on down the list.</p>

        <h3>Final tiebreak</h3>
        <p>If it comes down to a tie at the end of the season, it's settled in this order:</p>
        <ol class="ruleslist">
          <li>Last manager standing wins outright.</li>
          <li>Otherwise, most lives remaining.</li>
          <li>Still tied? Fewest losses.</li>
          <li>Still tied? Highest summed <b>value</b> of each manager's remaining (still-pickable) teams — each
          team's value is 21 minus its live league position (1st place = 20 points), the same scale as "Picked
          team value" above. Each remaining pick on a team counts separately, so a team you can still use twice
          counts twice toward the total. Highest total wins — whoever's still got the strongest teams genuinely
          in reserve.</li>
        </ol>

      </div></div>`;
}
document.getElementById('tabs').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  activeTab = b.dataset.tab;
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('on', x===b));
  if(activeTab==='rules') renderRulesPage(); else renderStats(latestSnap);
});
(function boot(){
  const a=document.createElement('script'); a.src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js';
  const b=document.createElement('script'); b.src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js';
  a.onload=()=>document.head.appendChild(b);
  b.onload=()=>{
    try{
      firebase.initializeApp(firebaseConfig);
      const ref = firebase.database().ref(`${PUBLIC_PATH}/current`);
      ref.on('value', snap=>{ render(snap.exists() ? snap.val() : null); },
        err=>{ view.innerHTML = `<div class="empty"><div class="big">Can't load stats</div><p>${err.message}</p></div>`; });
    }catch(e){
      view.innerHTML = `<div class="empty"><div class="big">Can't load stats</div><p>${e.message}</p></div>`;
    }
  };
  a.onerror = b.onerror = ()=>{ view.innerHTML = `<div class="empty"><div class="big">Can't load stats</div></div>`; };
  document.head.appendChild(a);
})();
</script>
</body>
</html>
